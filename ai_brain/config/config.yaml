brain:
  name: "AI Brain"
  reflection_interval: 60        # seconds between brain loops
  max_thoughts_per_cycle: 3      # max reasoning steps per loop
  verbose: true

agents:
  max_parallel: 5
  timeout: 300                   # seconds before agent is killed
  retry_attempts: 2

memory:
  database: "brain.db"
  max_events_recalled: 20        # events returned per recall
  max_knowledge_recalled: 10

llm:
  # ── Global defaults ──────────────────────────────────────────────────────
  # Used by any agent that does NOT have a per-agent override below.
  provider: "anthropic"          # anthropic | openai | ollama
  model: "claude-haiku-4-5-20251001"
  temperature: 0.7
  max_tokens: 2048

  # ── Per-agent model tiers ────────────────────────────────────────────────
  # Each agent can use a different provider/model.  Only specify what differs
  # from the defaults above.  Comment out any block to use the global default.
  #
  # Cost guidance (per million tokens, approximate):
  #   claude-haiku-4-5-20251001   $0.80 in  /  $4.00 out   ← fast & cheap
  #   claude-sonnet-4-6           $3.00 in  / $15.00 out   ← best reasoning
  #   claude-opus-4-6            $15.00 in  / $75.00 out   ← most capable
  #   gpt-4o-mini                 $0.15 in  /  $0.60 out   ← cheapest cloud
  #   ollama (local)              $0.00 in  /  $0.00 out   ← free, needs Pi 5
  agents:
    # Brain loop — makes the most LLM calls (every reflection_interval seconds).
    # Use Ollama locally to eliminate cloud cost for routine routing decisions.
    brain:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"
      # To switch to local (free):
      # provider: "ollama"
      # model: "phi3"                 # phi3 mini ~3.8B — fits Pi 4 (4GB)
      # model: "mistral"              # 7B — better quality, needs Pi 5 (8GB)
      # base_url: "http://localhost:11434"
      # fallback_provider: "anthropic"
      # fallback_model: "claude-haiku-4-5-20251001"

    # ResearchAgent — web search + summarisation; Haiku is accurate enough.
    ResearchAgent:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"

    # BuilderAgent — code generation; Sonnet produces significantly better code.
    BuilderAgent:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      max_tokens: 4096            # code outputs tend to be longer

    # PlannerAgent — multi-step reasoning; Sonnet gives more coherent plans.
    PlannerAgent:
      provider: "anthropic"
      model: "claude-sonnet-4-6"

    # OperatorAgent — simple shell command generation; Haiku is fine.
    OperatorAgent:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"

scheduler:
  check_interval: 10             # seconds between scheduler ticks

tools:
  web_search:
    enabled: true
    max_results: 5
  code_runner:
    enabled: true
    timeout: 30
    allowed_languages:
      - python
      - bash
  git:
    enabled: true

skills_dir: "skills"             # relative to ai_brain/
